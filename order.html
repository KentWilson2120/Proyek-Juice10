<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Logo-Icon/Logo_Kopi.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body id="Checkout">

    <header>
        <nav class="main-navigation">
            <div class="nav-container">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="menu-icon">&#9776;</label>

                <ul class="nav-menu">
                    <li><a href="home.html">HOME</a></li>
                    <li><a href="product.html">PRODUCT</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a id="HA" href="order.html">ORDER</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="checkout-form-section">
            <h2>Purchase Form</h2>

            <form id="purchaseForm">

                <div class="form-group full">
                    <label for="productSelect">Select Product</label>
                    <select id="productSelect" required>
                        <option value="">Choose Product</option>
                        <option>Espresso</option>
                        <option>Americano</option>
                        <option>Cappuccino</option>
                        <option>Latte</option>
                        <option>Matcha</option>
                        <option>Red Velvet</option>
                        <option>Nasi Goreng Telur</option>
                        <option>Nasi Goreng Kampung</option>
                        <option>Pisang Coklat</option>
                        <option>Kentang Goreng</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" min="1" value="1">
                </div>

                <div class="form-group">
                    <label>Total Price</label>
                    <div class="total-box">Rp 0</div>
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">@Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" required>
                </div>

                <div class="form-group full">
                    <label for="address">Address</label>
                    <textarea id="address" rows="3" required></textarea>
                </div>

                <div class="form-group full btn-group">
                    <button type="submit">Confirm Order</button>
                    <a href="product.html" class="btn-secondary">Back</a>
                </div>

            </form>
        </section>
    </main>

      
    <section id="receiptSection" class="receipt-section">
            <div id="receiptDetails">
                </div>
        </section>
    </main>

    <footer>
        &copy; 2026 Daun Jati Cafe
    </footer>
    <script src="script.js"></script>

</body>
</html>
